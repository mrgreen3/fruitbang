# Mango WM Configuration
# Reference: https://github.com/DreamMaoMao/mango/wiki/

# =============================================================================
# AUTOSTART
# =============================================================================
exec-once=swaybg -i /home/live/Backgrounds/sunset-lake.png -m fill
exec-once=waybar
exec-once=mako

# =============================================================================
# APPEARANCE
# =============================================================================
borderpx=2
border_radius=2
no_radius_when_single=0
no_border_when_single=0

rootcolor=0x251848ff
bordercolor=0x1e1540ff
focuscolor=0xc0568bff
maximizescreencolor=0x1e1540ff
urgentcolor=0xf2729aff
scratchpadcolor=0x1e1540ff
globalcolor=0x7b4178ff
overlaycolor=0xead6e8ff

focused_opacity=1.0
unfocused_opacity=1.0

# =============================================================================
# GAPS & SCRATCHPAD
# =============================================================================
gappih=3
gappiv=3
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# =============================================================================
# BLUR
# =============================================================================
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# =============================================================================
# SHADOWS
# =============================================================================
shadows=0
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

# =============================================================================
# ANIMATIONS
# =============================================================================
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=0
animation_fade_out=0
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=200
animation_duration_open=200
animation_duration_tag=200
animation_duration_close=150
animation_duration_focus=150
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# =============================================================================
# LAYOUTS
# =============================================================================
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

tagrule=id:1,open_as_floating:1
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# =============================================================================
# OVERVIEW
# =============================================================================
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# =============================================================================
# KEYBOARD
# =============================================================================
xkb_rules_layout=us
repeat_rate=25
repeat_delay=600
numlockon=0

# =============================================================================
# TRACKPAD  (requires relogin to apply)
# =============================================================================
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# =============================================================================
# MOUSE  (requires relogin to apply)
# =============================================================================
mouse_natural_scrolling=0

# =============================================================================
# MISC
# =============================================================================
focus_on_activate=1
sloppyfocus=1
warpcursor=1
cursor_size=24
cursor_theme=Adwaita
drag_tile_to_tile=1
axis_bind_apply_timeout=100
idleinhibit_ignore_visible=0
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30

# =============================================================================
# KEY BINDINGS
# =============================================================================

# --- Volume ---
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- Session ---
bind=SUPER,r,reload_config
bind=SUPER,m,quit
bind=SUPER,l,spawn,swaylock -f -c 000000

# --- Screenshot ---
bind=SUPER,p,spawn,sh -c 'f=~/Pictures/$(date +%d%m%y%H%M).png && grim "$f" && notify-send "Screenshot saved" "$f"'
bind=SUPER+SHIFT,p,spawn,~/Scripts/screenshot -r

# --- Launch ---
bind=SUPER,k,spawn,sh -c 'grep -E "(Super|Ctrl|Vol|Mute|Alt)" ~/Documents/Keybindings | rofi -dmenu -p "Keybinds" -columns 2 -theme-str "listview {lines: 16;}"'
bind=SUPER,space,spawn,rofi -show drun
bind=SUPER+SHIFT,e,spawn,~/Scripts/powermenu
bind=SUPER,Return,spawn,foot
bind=SUPER,w,spawn,firefox
bind=SUPER,h,spawn,l3afpad ~/Documents/Guide

# --- Windows ---
bind=SUPER,q,killclient,
bind=SUPER,s,togglefloating,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,g,togglegaps
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# --- Focus ---
bind=SUPER,Tab,focusstack,next
bind=SUPER+CTRL,Left,focusdir,left
bind=SUPER+CTRL,Right,focusdir,right
bind=SUPER+CTRL,Up,focusdir,up
bind=SUPER+CTRL,Down,focusdir,down

# --- Swap ---
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# --- Move (floating) ---
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# --- Resize (floating) ---
bind=CTRL+SUPER,Up,resizewin,+0,-50
bind=CTRL+SUPER,Down,resizewin,+0,+50
bind=CTRL+SUPER,Left,resizewin,-50,+0
bind=CTRL+SUPER,Right,resizewin,+50,+0

# --- Gaps ---
bind=SUPER+SHIFT,X,incgaps,1
bind=SUPER+SHIFT,Z,incgaps,-1

# --- Layout ---
bind=SUPER,n,switch_layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,

# --- Tags: switch ---
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=CTRL,Right,viewtoright_have_client,0
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# --- Tags: move window to tag ---
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# --- Tags: drag to adjacent monitor ---
bind=CTRL+SUPER+SHIFT,Left,tagtoleft,0
bind=CTRL+SUPER+SHIFT,Right,tagtoright,0

# --- Monitor focus ---
bind=SUPER+Alt,Left,focusmon,left
bind=SUPER+Alt,Right,focusmon,right
bind=SUPER+CTRL+Alt,Left,tagmon,left
bind=SUPER+CTRL+Alt,Right,tagmon,right

# =============================================================================
# MOUSE BINDINGS
# =============================================================================
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# =============================================================================
# AXIS BINDINGS
# =============================================================================
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# =============================================================================
# WINDOW RULES
# =============================================================================
windowrule=focused_opacity:0.85,appid:foot
windowrule=unfocused_opacity:0.75,appid:foot

# =============================================================================
# LAYER RULES
# =============================================================================
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
